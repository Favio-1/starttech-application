apiVersion: v1
kind: Service
metadata:
  name: backend-api
  labels:
    app: backend-api
spec:
  type: NodePort
  selector:
    app: backend-api
  ports:
    - port: 8080
      targetPort: 8080
      # Must match backend_node_port in starttech-infra/terraform/alb.tf
      # so the ALB's target group hits the right port on each node.
      nodePort: 30080
      protocol: TCP
