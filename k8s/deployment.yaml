apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  labels:
    app: backend-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
    spec:
      containers:
        - name: backend-api
          # This image tag is replaced automatically by the backend-ci-cd.yml
          # workflow with the ECR image built from the current commit SHA.
          image: <ECR_REPOSITORY_URL>:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_NAME
              value: "much_todo_db"
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: mongo-uri
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: jwt-secret-key
            - name: ENABLE_CACHE
              value: "true"
            # REDIS_ADDR must be host:port (e.g. <elasticache-endpoint>:6379) —
            # this is what internal/config actually reads, NOT REDIS_HOST.
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: redis-addr
            # The app's own CORS allow-list — include your CloudFront domain
            # here once it's known, comma-separated if more than one.
            - name: ALLOWED_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: allowed-origins
          readinessProbe:
            httpGet:
              # Real backend route is /health, not /api/v1/health — this
              # probe hits the pod directly, bypassing CloudFront entirely,
              # so no /api prefix applies here.
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
