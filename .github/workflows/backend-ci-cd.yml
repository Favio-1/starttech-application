name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'k8s/**'

permissions:
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: starttech-backend-api
  EKS_CLUSTER_NAME: starttech-cluster

jobs:
  test-build-deploy:
    name: Test, build, scan, push, deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        run: echo "sha_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        working-directory: backend
        run: |
          docker build -t $ECR_REPOSITORY:${{ steps.vars.outputs.sha_tag }} .
          docker tag $ECR_REPOSITORY:${{ steps.vars.outputs.sha_tag }} \
            ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.sha_tag }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.sha_tag }}'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'   # report only; set to '1' to fail the build on findings

      - name: Push image to ECR
        run: |
          docker push ${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.sha_tag }}

      - name: Update image tag in deployment manifest
        run: |
          sed -i "s|<ECR_REPOSITORY_URL>:.*|${{ steps.ecr-login.outputs.registry }}/$ECR_REPOSITORY:${{ steps.vars.outputs.sha_tag }}|" k8s/deployment.yaml

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name $EKS_CLUSTER_NAME --region $AWS_REGION

      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      - name: Verify rollout
        run: kubectl rollout status deployment/backend-api --timeout=180s
